<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ofertas Secretas de Casa</title>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #f3eee8;
      color: #3d3634;
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
    }

    .top-bar {
      width: 100%;
      background: #bf7774;
      color: #fff;
      text-align: center;
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.5px;
      padding: 12px 10px;
    }

    .page {
      min-height: calc(100vh - 42px);
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 48px 16px 30px;
    }

    .container {
      background-color: #fff;
      max-width: 420px;
      width: 100%;
      border-radius: 18px;
      padding: 34px 26px 28px;
      box-shadow: 0 12px 35px rgba(108, 86, 78, 0.08);
      text-align: center;
      position: relative;
    }

    .logo {
      width: 200px;
      max-width: 78%;
      height: 200px;
      display: block;
      object-fit: contain;
      margin: 0 auto 12px;
      border: 3px solid #bf7774;
      border-radius: 50%;
      padding: 10px;
      background: #fffafa;
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: 24px;
      font-weight: 700;
      color: #28211f;
      line-height: 1.2;
      margin-bottom: 4px;
    }

    .subtitle {
      font-family: 'Playfair Display', serif;
      font-size: 23px;
      font-style: italic;
      color: #b96f6c;
      line-height: 1.3;
      margin-bottom: 18px;
    }

    .description {
      color: #443936;
      max-width: 350px;
      margin: 0 auto 20px;
      padding: 12px 14px;
      background: #fffafa;
      border: 1px solid #f0d5d2;
      border-radius: 14px;
      line-height: 1.24;
      box-shadow: 0 8px 20px rgba(191, 119, 116, 0.10);
    }

    .description .desc-main {
      display: block;
      font-size: 19px;
      font-weight: 900;
      color: #28211f;
      margin-bottom: 5px;
    }

    .description .desc-highlight {
      display: block;
      font-size: 18px;
      font-weight: 900;
      color: #bf7774;
      margin-bottom: 4px;
    }

    .description .desc-final {
      display: block;
      font-size: 17px;
      font-weight: 800;
      color: #443936;
    }

    .btn-join {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      padding: 17px 20px;
      background-color: #22d45d;
      color: #ffffff;
      font-size: 16px;
      font-weight: 800;
      text-decoration: none;
      border-radius: 50px;
      box-shadow: 0 10px 24px rgba(34, 212, 93, 0.28);
      transition: transform 0.2s ease;
      animation: pulse 2s infinite;
    }

    .btn-join:hover {
      transform: scale(1.02);
    }

    .safe {
      margin-top: 13px;
      font-size: 12px;
      color: #685f5c;
      font-weight: 600;
    }

    .safe span {
      color: #bf7774;
      margin-right: 4px;
    }

    .spots {
      margin-top: 24px;
      border: 1px dashed #c88783;
      border-radius: 10px;
      padding: 14px;
      color: #bf7774;
      font-size: 13px;
      font-weight: 700;
      background: #fffafa;
    }

    .section-title {
      margin-top: 22px;
      margin-bottom: 14px;
      font-size: 13px;
      font-weight: 800;
      color: #bf7774;
      letter-spacing: 0.8px;
      text-align: center;
    }

    .benefits {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .benefit {
      display: flex;
      align-items: center;
      gap: 14px;
      text-align: left;
      background: #fff;
      border: 1px solid #eee4df;
      border-radius: 11px;
      padding: 14px;
    }

    .icon {
      min-width: 38px;
      width: 38px;
      height: 38px;
      border-radius: 50%;
      background: #f8e5e3;
      color: #c77c77;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
    }

    .benefit strong {
      display: block;
      font-size: 14px;
      color: #34302f;
      margin-bottom: 3px;
    }

    .benefit p {
      font-size: 12px;
      color: #6f6764;
      line-height: 1.35;
      margin: 0;
    }

    .join-notification {
      margin-top: 14px;
      width: 100%;
      opacity: 0;
      transform: translateY(8px);
      pointer-events: none;
      transition: opacity 0.35s ease, transform 0.45s ease;
    }

    .join-notification.show {
      opacity: 1;
      transform: translateY(0);
    }

    .join-pulse-btn {
      border: none;
      outline: none;
      background: #242424;
      color: #ffffff;
      padding: 13px 22px;
      border-radius: 50px;
      font-size: 13px;
      font-weight: 600;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.18);
      cursor: default;
      width: 100%;
    }

    .join-pulse-btn .bell {
      margin-right: 6px;
    }

    .join-pulse-btn strong {
      font-weight: 800;
      color: #ffffff;
    }

    @keyframes pulse {
      0% {
        transform: scale(1);
        box-shadow: 0 10px 24px rgba(34, 212, 93, 0.28);
      }

      50% {
        transform: scale(1.035);
        box-shadow: 0 14px 28px rgba(34, 212, 93, 0.42);
      }

      100% {
        transform: scale(1);
        box-shadow: 0 10px 24px rgba(34, 212, 93, 0.28);
      }
    }

    @media (max-width: 480px) {
      .top-bar {
        font-size: 12px;
        padding: 9px 8px;
      }

      .page {
        min-height: calc(100vh - 34px);
        padding: 12px 10px 10px;
        align-items: flex-start;
      }

      .container {
        max-width: 360px;
        border-radius: 16px;
        padding: 16px 15px 14px;
      }

      .logo {
        width: 155px;
        height: 155px;
        max-width: 62%;
        margin-bottom: 8px;
        border-width: 2px;
        padding: 8px;
      }

      h1 {
        font-size: 20px;
        line-height: 1.12;
        margin-bottom: 2px;
      }

      .subtitle {
        font-size: 19px;
        line-height: 1.12;
        margin-bottom: 10px;
      }

      .description {
        max-width: 100%;
        padding: 10px 10px;
        margin-bottom: 12px;
        line-height: 1.18;
      }

      .description .desc-main {
        font-size: 17px;
        margin-bottom: 4px;
      }

      .description .desc-highlight {
        font-size: 16px;
        margin-bottom: 3px;
      }

      .description .desc-final {
        font-size: 15px;
      }

      .btn-join {
        font-size: 14px;
        padding: 13px 16px;
      }

      .safe {
        margin-top: 8px;
        font-size: 11px;
      }

      .spots {
        margin-top: 13px;
        padding: 10px;
        font-size: 12px;
      }

      .section-title {
        margin-top: 13px;
        margin-bottom: 8px;
        font-size: 12px;
      }

      .benefits {
        gap: 8px;
      }

      .benefit {
        gap: 10px;
        padding: 10px;
      }

      .icon {
        min-width: 32px;
        width: 32px;
        height: 32px;
        font-size: 16px;
      }

      .benefit strong {
        font-size: 13px;
        margin-bottom: 2px;
      }

      .benefit p {
        font-size: 11px;
        line-height: 1.25;
      }

      .join-notification {
        margin-top: 9px;
      }

      .join-pulse-btn {
        font-size: 11px;
        padding: 10px 14px;
      }
    }

    @media (max-height: 700px) and (max-width: 480px) {
      .page {
        padding-top: 8px;
      }

      .container {
        padding-top: 13px;
        padding-bottom: 12px;
      }

      .logo {
        width: 142px;
        height: 142px;
        margin-bottom: 7px;
      }

      .description {
        padding: 8px 9px;
        margin-bottom: 10px;
      }

      .description .desc-main {
        font-size: 16px;
      }

      .description .desc-highlight {
        font-size: 15px;
      }

      .description .desc-final {
        font-size: 14px;
      }

      .spots,
      .section-title {
        margin-top: 10px;
      }

      .benefit {
        padding: 9px;
      }
    }
  </style>
</head>
